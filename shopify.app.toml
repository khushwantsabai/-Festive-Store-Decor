# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "80b6aa3397092de35054368f85808873"
name = "Festive Store Decor"
application_url = "https://festivestoredecor.sabaiinnovations.com"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = ""

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/privacy"
  topics = [ "customers/data_request", "customers/redact", "shop/redact" ]

[auth]
redirect_urls = [
  "https://festivestoredecor.sabaiinnovations.com/auth/callback",
  "https://festivestoredecor.sabaiinnovations.com/auth/shopify/callback",
  "https://festivestoredecor.sabaiinnovations.com/api/auth/callback"
]

[build]
automatically_update_urls_on_dev = true
